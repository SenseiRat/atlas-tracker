# Mirror pushes up to GitHub. Purely outbound: Gitea/Forgejo pushes to GitHub
# over HTTPS; GitHub never connects down to the homelab.
#
# Note: Gitea also has this built in with zero CI involvement — Repo Settings →
# Repository → Mirror Settings → "Push mirror" (add the GitHub URL + a PAT and
# tick "sync on commit"). The built-in mirror also propagates branch DELETIONS,
# which this workflow does not (a delete does not trigger a push event here).
# This workflow is the pipeline-managed alternative: explicit, versioned with
# the repo, and visible in the Actions log.
#
# Setup (one secret, one optional variable):
#   * Secret `MIRROR_TOKEN` — a GitHub fine-grained PAT with "Contents:
#     read and write" on the mirror repo (classic PAT: `repo` scope).
#     (Gitea reserves the GITHUB_/GITEA_ prefixes for secret names, hence
#     the name MIRROR_TOKEN.)
#   * Variable `MIRROR_REPO` — target "owner/repo"; defaults to
#     SenseiRat/trip-tracker below.
name: Mirror to GitHub

on:
  push:
    branches: ['**']
    tags: ['**']

# Queue mirror runs per-ref rather than cancelling: every push should land.
concurrency:
  group: mirror-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          # Full fetch so the pushed ref (including annotated tags) exists
          # locally exactly as it does on the Gitea remote.
          fetch-depth: 0

      - name: Push ref to GitHub
        env:
          MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          if [ -z "$MIRROR_TOKEN" ]; then
            echo "MIRROR_TOKEN secret is not set; skipping mirror." >&2
            exit 1
          fi
          REPO="${MIRROR_REPO:-SenseiRat/trip-tracker}"
          # Force-push the exact ref that triggered this run. Gitea is the
          # source of truth; the GitHub side is a read-only mirror, so a
          # force-push is correct even after history rewrites.
          git push --force \
            "https://x-access-token:${MIRROR_TOKEN}@github.com/${REPO}.git" \
            "+${GITHUB_REF}:${GITHUB_REF}"
          echo "Mirrored ${GITHUB_REF} -> github.com/${REPO}"
