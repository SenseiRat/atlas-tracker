# CI/CD pipeline for Gitea Actions and Forgejo Actions.
#
# Location note: both Gitea and Forgejo read workflows from `.gitea/workflows`,
# so this single file works on either. (Forgejo also reads `.forgejo/workflows`;
# rename the directory if you prefer that convention.)
#
# Third-party actions are referenced by full `https://github.com/...` URL. Gitea
# and Forgejo resolve bare `uses:` names against *different* default hosts
# (github.com vs code.forgejo.org), so pinning the full URL makes the pipeline
# portable across both without depending on the instance's DEFAULT_ACTIONS_URL.
#
# Gate policy (this is a personal project, not a hard security gate):
#   * Hard gates  -> the automated test suites (pytest, vitest) and the image
#                    build. If these fail, nothing is published.
#   * Report-only -> every quality/security scanner (Ruff, ESLint, Semgrep,
#                    Gitleaks, Trivy). They annotate the run summary and upload
#                    reports but never block the build. Promote any of them to a
#                    gate by removing its `continue-on-error` / `--exit-code 0`.
name: CI/CD

on:
  push:
    branches: [main]
  # Run the checks on PRs too; the publish job below is guarded to main pushes.
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so the homelab runner isn't wasting
# cycles on stale commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # 1 + 4 (backend): Ruff lint (report-only) and pytest (hard gate).
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    # act_runner executes JS actions (checkout, upload-artifact) with the *job
    # container's* node binary, so the image must ship node in addition to
    # python — plain python:3.11 fails with exit 127 (nektos/act#107). This
    # image is python 3.11 + node 20 and, like the full python image, ships git.
    container: nikolaik/python-nodejs:python3.11-nodejs20
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --no-cache-dir ruff==0.8.6
          pip install --no-cache-dir -r server/requirements-dev.txt

      - name: Ruff (lint / code quality)
        continue-on-error: true  # report-only
        run: |
          ruff check --output-format=github . | tee ruff.txt
          {
            echo "### Ruff (Python lint)";
            echo '```';
            ruff check --statistics . || true;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Pytest (automated tests)
        run: pytest -q
        working-directory: server

  # ---------------------------------------------------------------------------
  # 1 + 4 (frontend): ESLint + tsc (report-only) and vitest (hard gate).
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    container: node:20  # full image ships git for actions/checkout
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Install dependencies
        run: npm ci --no-fund --no-audit

      - name: ESLint (lint / code quality)
        continue-on-error: true  # report-only
        run: npm run lint

      - name: Typecheck (tsc)
        continue-on-error: true  # report-only
        run: npm run typecheck

      - name: Vitest (automated tests)
        run: npm test

  # ---------------------------------------------------------------------------
  # 3: Secrets scan with Gitleaks (report-only). Needs full history, hence
  #    fetch-depth: 0, so leaks introduced in any past commit are caught too.
  # ---------------------------------------------------------------------------
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Gitleaks scan
        run: |
          # --exit-code 0 keeps this report-only; config lives in .gitleaks.toml
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --exit-code 0 \
            --verbose | tee gitleaks.txt || true
          COUNT=$(jq '[.runs[0].results[]] | length' gitleaks.sarif 2>/dev/null || echo '?')
          {
            echo "### Gitleaks (secrets)";
            echo "Potential secrets found: **${COUNT}**";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Gitleaks report
        continue-on-error: true
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

  # ---------------------------------------------------------------------------
  # 2: SAST with Semgrep (report-only). `--config auto` selects rulesets for the
  #    languages it detects (Python + TypeScript/React here).
  # ---------------------------------------------------------------------------
  sast:
    runs-on: ubuntu-latest
    # semgrep/semgrep:latest has no node, so JS actions can't run in it (see the
    # note on the backend job). Use the python+node image and pip-install
    # semgrep instead.
    container: nikolaik/python-nodejs:python3.11-nodejs20
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Install Semgrep
        run: pip install --no-cache-dir semgrep

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config auto \
            --sarif --output semgrep.sarif \
            --metrics on \
            . || true
          COUNT=$(python -c "import json;print(len(json.load(open('semgrep.sarif'))['runs'][0]['results']))" 2>/dev/null || echo '?')
          {
            echo "### Semgrep (SAST)";
            echo "Findings: **${COUNT}**";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Semgrep report
        continue-on-error: true
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  # ---------------------------------------------------------------------------
  # 5 + 6: Build the image, scan it with Trivy (report-only), then publish to
  #        the Gitea/Forgejo container registry under a version tag and `latest`.
  #        Only runs on a push to main, and only after the test gates pass.
  # ---------------------------------------------------------------------------
  build-and-publish:
    runs-on: ubuntu-latest  # host runner: needs the Docker daemon
    needs: [backend, frontend, secrets, sast]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: https://github.com/actions/checkout@v4

      - name: Compute image name and tags
        id: meta
        run: |
          # Registry host: use the REGISTRY variable if set, otherwise derive it
          # from the instance URL (e.g. https://git.example.com -> git.example.com).
          REGISTRY="${{ vars.REGISTRY }}"
          if [ -z "$REGISTRY" ]; then
            REGISTRY="${{ github.server_url }}"
            REGISTRY="${REGISTRY#https://}"
            REGISTRY="${REGISTRY#http://}"
          fi
          IMAGE="$REGISTRY/${{ github.repository }}"
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')  # registries require lowercase
          # sed rather than node: this job runs on the host runner (for the
          # Docker daemon), which may not have node installed.
          VERSION=$(sed -n 's/^[[:space:]]*"version":[[:space:]]*"\([^"]*\)".*/\1/p' frontend/package.json | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "Could not read version from frontend/package.json" >&2
            exit 1
          fi
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "registry=$REGISTRY"        >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE"              >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA"            >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${{ steps.meta.outputs.image }}:ci-build" .

      - name: Install Trivy
        # report-only chain: a failed download shouldn't block the publish
        continue-on-error: true
        run: |
          VERSION=0.72.0
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /usr/local/bin trivy
          trivy version

      - name: Trivy image scan (dependency + OS CVEs)
        continue-on-error: true  # report-only
        run: |
          # Scan the image we are about to ship: OS packages + installed pip deps.
          trivy image \
            --scanners vuln,secret,misconfig \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif --output trivy.sarif \
            --exit-code 0 \
            "${{ steps.meta.outputs.image }}:ci-build" || true
          trivy image --severity HIGH,CRITICAL --ignore-unfixed \
            "${{ steps.meta.outputs.image }}:ci-build" > trivy.txt 2>&1 || true
          {
            echo "### Trivy (image vulnerabilities)";
            echo '```';
            tail -n 40 trivy.txt;
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy report
        continue-on-error: true
        uses: https://github.com/actions/upload-artifact@v3
        with:
          name: trivy-sarif
          path: trivy.sarif

      - name: Log in to the registry
        run: |
          # Prefer an explicit REGISTRY_TOKEN secret (an access token with
          # package:write); fall back to the automatic per-run token. The login
          # user must own the token: override with the REGISTRY_USER variable if
          # the token owner isn't the pusher.
          TOKEN="${{ secrets.REGISTRY_TOKEN }}"
          TOKEN="${TOKEN:-${{ github.token }}}"
          USER="${{ vars.REGISTRY_USER }}"
          USER="${USER:-${{ github.actor }}}"
          echo "$TOKEN" | docker login "${{ steps.meta.outputs.registry }}" \
            -u "$USER" --password-stdin

      - name: Tag and push (version + latest)
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${{ steps.meta.outputs.version }}"
          SHA="${{ steps.meta.outputs.sha }}"
          for TAG in "$VERSION" "$VERSION-$SHA" "latest"; do
            docker tag "$IMAGE:ci-build" "$IMAGE:$TAG"
            docker push "$IMAGE:$TAG"
            echo "pushed $IMAGE:$TAG"
          done
          {
            echo "### Published image";
            echo "- \`$IMAGE:$VERSION\`";
            echo "- \`$IMAGE:$VERSION-$SHA\`";
            echo "- \`$IMAGE:latest\`";
          } >> "$GITHUB_STEP_SUMMARY"
