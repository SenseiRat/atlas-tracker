services:
  atlas-tracker:
    image: git.starnes.cloud/projects/atlas-tracker:latest
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "8000:8000"
    environment:
      DB_BACKEND: "${DB_BACKEND:-auto}"
      DB_HOST: "${DB_HOST:-}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${DB_NAME:-}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
      DB_SSLMODE: "${DB_SSLMODE:-prefer}"
      DATA_DIR: "${DATA_DIR:-/data}"
      SQLITE_DB_PATH: "${SQLITE_DB_PATH:-}"
      SQLITE_BUSY_TIMEOUT_MS: "${SQLITE_BUSY_TIMEOUT_MS:-5000}"
      SQLITE_ENABLE_WAL: "${SQLITE_ENABLE_WAL:-1}"
      DATA_SYNC_INTERVAL_SECONDS: "${DATA_SYNC_INTERVAL_SECONDS:-3600}"
      IMPORT_MAX_BYTES: "${IMPORT_MAX_BYTES:-10485760}"
      OIDC_ISSUER: "${OIDC_ISSUER:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_SCOPES: "${OIDC_SCOPES:-openid profile email}"
      OIDC_REDIRECT_PATH: "${OIDC_REDIRECT_PATH:-/api/auth/callback}"
      OIDC_SESSION_SECRET: "${OIDC_SESSION_SECRET:-}"
      OIDC_SESSION_COOKIE: "${OIDC_SESSION_COOKIE:-atlas_tracker_session}"
      OIDC_LOGIN_COOKIE: "${OIDC_LOGIN_COOKIE:-atlas_tracker_login}"
      OIDC_SESSION_TTL_SECONDS: "${OIDC_SESSION_TTL_SECONDS:-604800}"
      OIDC_LOGIN_TTL_SECONDS: "${OIDC_LOGIN_TTL_SECONDS:-600}"
      OIDC_COOKIE_SECURE: "${OIDC_COOKIE_SECURE:-0}"
      UVICORN_HOST: "${UVICORN_HOST:-0.0.0.0}"
      UVICORN_PORT: "${UVICORN_PORT:-8000}"
      UVICORN_WORKERS: "${UVICORN_WORKERS:-1}"
      FORWARDED_ALLOW_IPS: "${FORWARDED_ALLOW_IPS:-127.0.0.1}"
    volumes:
      #- atlas-tracker-data:/data
      - ./atlas-tracker-data:/data

